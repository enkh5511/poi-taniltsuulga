<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>PCG · Төслийн явц</title><link rel="stylesheet" href="assets/member.css"></head><body><main class="shell" style="width:min(1480px,calc(100% - 20px))"><div class="toolbar"><nav class="nav"><a id="homeLink" href="index.html">Гишүүний булан</a><a class="active" id="progressNav" href="progress.html">Төслийн явц</a><a id="closeNav" href="close.html">Төслийн хаалт</a></nav><button class="btn secondary" id="logoutBtn">Гарах</button></div><section class="panel" style="padding:8px"><iframe class="frame" id="progressFrame" title="Төслийн явц"></iframe></section></main><script src="assets/member.js"></script><script>const q='?environment='+POIMember.ENV;document.getElementById('homeLink').href='index.html'+q;document.getElementById('progressNav').href='progress.html'+q;document.getElementById('closeNav').href='close.html'+q;const s=POIMember.session();if(!s){location.replace('index.html'+q)}else{const frame=document.getElementById('progressFrame');frame.src='../app/performance.html'+q+'&member_portal=progress';frame.addEventListener('load',function(){try{const w=frame.contentWindow;w.__sheetLastCredentials={memberNo:s.memberNo,session:s.session};if(typeof w.loadPerformanceDashboard==='function')w.loadPerformanceDashboard(true);const auth=w.document.getElementById('sheetAuthView');const tabs=w.document.getElementById('memberSubtabs');if(auth)auth.style.display='none';if(tabs)tabs.style.display='none'}catch(e){console.warn(e)}})}document.getElementById('logoutBtn').onclick=()=>{POIMember.clearSession();location.replace('index.html'+q)};</script></body></html>
