<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>PCG · Төслийн хаалт</title><link rel="stylesheet" href="assets/member.css"></head><body><main class="shell"><div class="toolbar"><nav class="nav"><a id="homeLink" href="index.html">Гишүүний булан</a><a id="progressNav" href="progress.html">Төслийн явц</a><a class="active" id="closeNav" href="close.html">Төслийн хаалт</a></nav><button class="btn secondary" id="logoutBtn">Гарах</button></div><section class="panel" id="closePanel"><div class="empty"><h2>Хаалтын мэдээлэл татаж байна…</h2><p class="muted">LIVE backend-ээс тухайн гишүүний эцсийн тооцоог уншиж байна.</p></div></section></main><script src="assets/member.js"></script><script>const q='?environment='+POIMember.ENV;['homeLink','progressNav','closeNav'].forEach(id=>{const el=document.getElementById(id);el.href=(id==='homeLink'?'index.html':id==='progressNav'?'progress.html':'close.html')+q});const panel=document.getElementById('closePanel');const s=POIMember.session();if(!s){location.replace('index.html'+q)}document.getElementById('logoutBtn').onclick=()=>{POIMember.clearSession();location.replace('index.html'+q)};function n(v){const x=Number(v);return isFinite(x)?x:0}function pick(o,keys,def){for(const k of keys){if(o&&o[k]!==undefined&&o[k]!==null&&o[k]!=='')return o[k]}return def}function render(snapshot){const c=POIMember.closeData(snapshot);if(!c||!c.active){panel.innerHTML='<div class="close-head"><div><small style="color:#ffd37a;font-weight:950;letter-spacing:.08em">ТӨСЛИЙН ХААЛТ</small><h2>Хаалтын тооцоо нээгдээгүй байна</h2><p class="muted">Админ “Төслийн хаалт”-ыг нээх үед энэ хэсэг автоматаар идэвхжиж, таны эцсийн тооцоо энд гарна.</p></div><span class="state-pill">ИДЭВХГҮЙ</span></div><div class="empty"><button class="btn" id="refreshBtn">Дахин шалгах</button></div>';document.getElementById('refreshBtn').onclick=load;return}const original=n(pick(c,['originalCapital','original_capital','capital'],0));const monthly=n(pick(c,['monthlyGross','monthly_gross','monthlyProfit','monthly_profit'],0));const closeChange=n(pick(c,['closeProfit','close_profit','closingProfit','closing_profit','closeChange'],0));const taxable=n(pick(c,['taxableProfit','taxable_profit'],Math.max(0,monthly+Math.max(0,closeChange))));const tax=n(pick(c,['taxReserve','tax_reserve','tax'],0));const early=n(pick(c,['earlyPaid','early_paid'],0));const gp=Math.max(5,Math.min(15,Math.round(n(pick(c,['gratitudePct','gratitude_pct'],5)))));const gratitude=n(pick(c,['gratitudeAmount','gratitude_amount'],0));const afterTax=n(pick(c,['afterTaxTotal','after_tax_total','lifetimeFinalTotal'],original+monthly+closeChange-tax));const finalNow=n(pick(c,['finalTotal','final_total'],afterTax-gratitude-early));const gross=original+monthly+closeChange;const confirmed=!!pick(c,['confirmed','isConfirmed'],false);panel.innerHTML='<div class="close-head"><div><small style="color:#ffd37a;font-weight:950;letter-spacing:.08em">ТӨСЛИЙН ХААЛТ</small><h2>'+(confirmed?'Эцсийн тооцоо баталгаажсан':'Таны эцсийн тооцоо')+'</h2><p class="muted">Админы хаалтын тооцоонд үндэслэсэн гишүүний эцсийн мөнгөн дүн.</p></div><span class="state-pill">'+(confirmed?'БАТАЛГААЖСАН':'БАТАЛГААЖУУЛАЛТ ХҮЛЭЭЖ БАЙНА')+'</span></div><div class="grid"><div class="metric"><span>Анхны хөрөнгө</span><b>'+POIMember.money(original)+'</b></div><div class="metric green"><span>+ Сарын хуримтлагдсан ашиг</span><b>'+POIMember.money(monthly)+'</b></div><div class="metric '+(closeChange>=0?'green':'red')+'"><span>'+(closeChange>=0?'+ Данс хаах үеийн ашиг':'− Данс хаах үеийн алдагдал')+'</span><b>'+POIMember.money(closeChange)+'</b></div><div class="metric gold"><span>= Суутгалын өмнөх нийт эрх</span><b>'+POIMember.money(gross)+'</b></div><div class="metric"><span>Татвар ногдох ашиг</span><b>'+POIMember.money(taxable)+'</b></div><div class="metric red"><span>− Түр татвар · 17.8%</span><b>'+POIMember.money(-tax)+'</b></div><div class="metric"><span>Татварын дараах нийт эрх</span><b>'+POIMember.money(afterTax)+'</b></div><div class="metric red"><span>− Өмнө олгосон ашиг</span><b>'+POIMember.money(-early)+'</b></div></div><div class="formula">Анхны хөрөнгө + сарын ашиг + данс хаах үеийн ашиг/алдагдал − татвар − PCG талархал − өмнө олгосон ашиг = гар дээр авах эцсийн мөнгө.</div><div class="gratitude"><div class="gratitude-row"><div><strong>PCG-д өгөх талархлын хувь</strong><p class="muted" style="margin:6px 0 0">Default 5%. Та 5–15%-ийн хооронд сонгоно.</p></div><b id="pctText">'+gp+'%</b></div><input id="slider" type="range" min="5" max="15" step="1" value="'+gp+'" '+(confirmed?'disabled':'')+'><div class="grid"><div class="metric red"><span>Талархлын дүн</span><b id="gratitudeAmount">'+POIMember.money(-gratitude)+'</b></div><div class="metric green"><span>Баталгаажуулсны дараах эцсийн дүн</span><b id="previewFinal">'+POIMember.money(finalNow)+'</b></div></div><div class="status" id="saveStatus">'+(confirmed?'Таны сонголт баталгаажсан байна.':'Slider-аа сонгоод доорх товчийг дарна уу.')+'</div><button class="btn gold" id="saveBtn" '+(confirmed?'disabled':'')+'>'+(confirmed?'Баталгаажсан':'Сонголтоо баталгаажуулах')+'</button></div><div class="big-total"><span>ТӨСЛИЙН ЭЦЭСТ ГАР ДЭЭР АВАХ МӨНГӨ</span><b id="bigFinal">'+POIMember.money(finalNow)+'</b></div>';const base=Math.max(0,afterTax);const slider=document.getElementById('slider');const preview=()=>{const p=n(slider.value);const g=Math.round(base*p/100);const f=Math.max(0,Math.round(afterTax-g-early));document.getElementById('pctText').textContent=p+'%';document.getElementById('gratitudeAmount').textContent=POIMember.money(-g);document.getElementById('previewFinal').textContent=POIMember.money(f);document.getElementById('bigFinal').textContent=POIMember.money(f)};slider.oninput=preview;document.getElementById('saveBtn').onclick=async function(){const btn=this,st=document.getElementById('saveStatus');btn.disabled=true;btn.textContent='Баталгаажуулж байна…';st.className='status';st.textContent='Татвар, талархал болон эцсийн дүнг backend дээр дахин тооцоолж байна…';try{const snap=await POIMember.saveGratitude(slider.value);st.className='status ok';st.textContent='Сонголт амжилттай баталгаажлаа.';render(snap)}catch(e){st.className='status bad';st.textContent=e.message||String(e);btn.disabled=false;btn.textContent='Дахин баталгаажуулах'}}}async function load(){panel.innerHTML='<div class="empty"><h2>Хаалтын мэдээлэл татаж байна…</h2><p class="muted">LIVE backend-ээс хамгийн шинэ төлөвийг уншиж байна.</p></div>';try{render(await POIMember.read())}catch(e){panel.innerHTML='<div class="empty"><h2>Мэдээлэл татаж чадсангүй</h2><p class="muted">'+String(e.message||e)+'</p><button class="btn" onclick="location.reload()">Дахин оролдох</button></div>'}}load();</script></body></html>
