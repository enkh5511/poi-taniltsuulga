<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="color-scheme" content="dark"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><meta name="poi-release" content="V39.16.33"><title>PCG · Төслийн хаалт</title><style id="poi-child-alpha-v391632">:root,html,body{background:transparent!important;background-color:rgba(0,0,0,0)!important;background-image:none!important}</style><link rel="stylesheet" href="assets/member.css?v=391633"><link rel="stylesheet" href="assets/member-toolbar.css?v=391633"></head><body><main class="shell"><div class="toolbar"><nav class="nav"><a id="homeLink" href="index.html">Гишүүний булан</a><a id="progressNav" href="#">Төслийн явц</a><a class="active" id="closeNav" href="close.html">Төслийн хаалт</a></nav><span class="member-name" id="memberName"></span><button class="btn secondary" id="logoutBtn">Гарах</button></div><section class="panel" id="closePanel"><div class="empty"><div class="loading-row"><span class="spinner"></span><h2>Хаалтын мэдээлэл татаж байна…</h2></div><p class="muted">Таны баталгаажсан хаалтын тооцоог уншиж байна.</p></div></section></main><script src="assets/member.js"></script><script>
(function(){const q='?environment='+POIMember.ENV;document.getElementById('homeLink').href='index.html'+q;document.getElementById('progressNav').href='../app/performance.html?member_portal=progress&environment='+POIMember.ENV;document.getElementById('closeNav').href='close.html'+q;const panel=document.getElementById('closePanel');if(!POIMember.session())location.replace('index.html'+q);document.getElementById('logoutBtn').onclick=()=>{POIMember.clearSession();location.replace('index.html'+q)};function n(v){const x=Number(v);return isFinite(x)?x:0}function pick(o,keys,def){for(const k of keys){if(o&&o[k]!==undefined&&o[k]!==null&&o[k]!=='')return o[k]}return def}function memberDisplay(snapshot){const s=POIMember.session()||{},m=(snapshot&&snapshot.member)||s.member||{};return m.display_name||m.name||('Гишүүн '+(s.memberNo||''))}function render(snapshot){const name=memberDisplay(snapshot);document.getElementById('memberName').textContent=name+' · Гишүүн №'+String((POIMember.session()||{}).memberNo||'');const c=POIMember.closeData(snapshot);if(!c||!c.active){panel.innerHTML='<div class="close-head"><div><small style="color:#ffd37a;font-weight:950;letter-spacing:.08em">ТӨСЛИЙН ХААЛТ</small><h2>Тавтай морил, '+name+'</h2><p class="muted">Төслийн хаалтын тооцоо одоогоор нээгдээгүй байна. Админ хаалтыг нээх үед таны эцсийн тооцоо энд автоматаар гарна.</p></div><span class="state-pill">НЭЭГДЭЭГҮЙ</span></div>';return}const original=n(pick(c,['originalCapital','original_capital','capital'],0)),monthly=n(pick(c,['monthlyGross','monthly_gross'],0)),closeTotal=n(pick(c,['closeTotal','close_total','closingAmount'],0)),closeProfit=n(pick(c,['closeProfit','close_profit'],closeTotal-original)),taxable=n(pick(c,['taxableProfit','taxable_profit'],Math.max(0,monthly+Math.max(0,closeProfit)))),tax=n(pick(c,['taxReserve','tax_reserve'],0)),early=n(pick(c,['earlyPaid','early_paid'],0)),gp=Math.max(5,Math.min(15,Math.round(n(pick(c,['gratitudePct','gratitude_pct'],5))))),gratitude=n(pick(c,['gratitudeAmount','gratitude_amount'],0)),lifetime=n(pick(c,['lifetimeFinalTotal','lifetime_final_total'],original+monthly+closeProfit-tax-gratitude)),finalNow=n(pick(c,['finalTotal','final_total'],lifetime-early)),confirmed=!!pick(c,['confirmed','isConfirmed'],false),gross=original+monthly+closeProfit,afterTax=Math.max(0,gross-tax),base=Math.max(0,lifetime+gratitude),cc=n(pick(c,['confirmationCount','confirmation_count'],0)),rc=n(pick(c,['requiredConfirmationCount','required_confirmation_count'],0));panel.innerHTML='<div class="close-head"><div><small style="color:#ffd37a;font-weight:950;letter-spacing:.08em">ТӨСЛИЙН ХААЛТ</small><h2>Тавтай морил, '+name+'</h2><p class="muted">'+name+' таны эцсийн тооцоо.</p></div><span class="state-pill active">'+(confirmed?'БАТАЛГААЖСАН':'БАТАЛГААЖУУЛАЛТ ХҮЛЭЭЖ БАЙНА')+'</span></div><div class="grid"><div class="metric"><span>Анхны хөрөнгө</span><b>'+POIMember.money(original)+'</b></div><div class="metric green"><span>+ Сарын хуримтлагдсан ашиг</span><b>'+POIMember.money(monthly)+'</b></div><div class="metric '+(closeProfit>=0?'green':'red')+'"><span>'+(closeProfit>=0?'+ Данс хаах үеийн ашиг':'− Данс хаах үеийн алдагдал')+'</span><b>'+POIMember.money(closeProfit)+'</b></div><div class="metric gold"><span>= Суутгалын өмнөх нийт эрх</span><b>'+POIMember.money(gross)+'</b></div><div class="metric"><span>Татвар ногдох нийт ашиг</span><b>'+POIMember.money(taxable)+'</b></div><div class="metric red"><span>− PCG-ийн төслийн татварын зардал · 17.8%</span><b>'+POIMember.money(-tax)+'</b></div><div class="metric"><span>Татварын дараах нийт эрх</span><b>'+POIMember.money(afterTax)+'</b></div><div class="metric red"><span>− Өмнө олгосон ашиг</span><b>'+POIMember.money(-early)+'</b></div></div><div class="tax-note"><strong>PCG-ийн төслийн татварын зардал · 17.8%</strong>Төслийн фьючерсийн арилжааны данс болон брокерын татварын мэдээлэл PCG-ийн нэр, татварын дугаараар бүртгэгддэг. Иймээс жилийн эцсийн татварын тайлагнал, төлбөрийг санхүүжүүлэх зорилгоор гишүүний анхны хөрөнгөд татвар тооцолгүй, зөвхөн арилжааны ашгийн хэсгээс гэрээний дагуу 17.8%-ийн төслийн татварын зардал суутгана.</div><div class="formula">Анхны хөрөнгө + сарын хуримтлагдсан ашиг + данс хаах үеийн ашиг/алдагдал − PCG-ийн төслийн татварын зардал − PCG талархал − өмнө олгосон ашиг = гар дээр авах эцсийн мөнгө.</div><div class="gratitude"><div class="gratitude-row"><div><strong>PCG-д өгөх талархлын хувь</strong><p class="muted" style="margin:6px 0 0">Үндсэн хувь 5%. Та 5–15%-ийн хооронд сонгоно.</p></div><b id="pctText">'+gp+'%</b></div><input id="slider" type="range" min="5" max="15" step="1" value="'+gp+'" '+(confirmed?'disabled':'')+'><div class="grid"><div class="metric red"><span>Талархлын дүн</span><b id="gratitudeAmount">'+POIMember.money(-gratitude)+'</b></div><div class="metric green"><span>Баталгаажуулсны дараах эцсийн дүн</span><b id="previewFinal">'+POIMember.money(finalNow)+'</b></div></div><div class="status" id="saveStatus">'+(confirmed?'Таны сонголт баталгаажсан. Дахин өөрчлөх боломжгүй.':'Хувиа сонгоод баталгаажуулна уу.')+'</div><button class="btn gold" id="saveBtn" '+(confirmed?'disabled':'')+'>'+(confirmed?'Баталгаажсан':'Сонголтоо баталгаажуулах')+'</button></div><div class="big-total"><span>ТӨСЛИЙН ЭЦЭСТ ГАР ДЭЭР АВАХ МӨНГӨ</span><b id="bigFinal">'+POIMember.money(finalNow)+'</b></div><div class="formula">Хаалтын төлөв: '+cc+' / '+rc+' гишүүн баталгаажуулсан · Хаалтын ID: '+String(c.closeId||'—')+'</div>';const slider=document.getElementById('slider');function preview(){const p=n(slider.value),g=Math.round(base*p/100),f=Math.max(0,Math.round(base-g-early));document.getElementById('pctText').textContent=p+'%';document.getElementById('gratitudeAmount').textContent=POIMember.money(-g);document.getElementById('previewFinal').textContent=POIMember.money(f);document.getElementById('bigFinal').textContent=POIMember.money(f)}slider.oninput=preview;const save=document.getElementById('saveBtn');if(save&&!confirmed)save.onclick=async function(){const st=document.getElementById('saveStatus');this.disabled=true;this.textContent='Баталгаажуулж байна…';st.className='status';st.textContent='Эцсийн дүнг backend дээр дахин тооцоолж байна…';try{const snap=await POIMember.saveGratitude(slider.value);st.className='status ok';st.textContent='Сонголт амжилттай баталгаажлаа.';render(snap)}catch(e){st.className='status bad';st.textContent=e.message==='member_close_confirmation_locked'?'Өмнө баталгаажуулсан сонголтыг дахин өөрчлөх боломжгүй.':(e.message||String(e));this.disabled=false;this.textContent='Дахин баталгаажуулах'}}}async function load(){panel.innerHTML='<div class="empty"><div class="loading-row"><span class="spinner"></span><h2>Хаалтын мэдээлэл татаж байна…</h2></div><p class="muted">Таны баталгаажсан хаалтын тооцоог уншиж байна.</p></div>';try{render(await POIMember.read())}catch(e){panel.innerHTML='<div class="empty"><h2>Мэдээлэл татаж чадсангүй</h2><p class="muted">'+String(e.message||e)+'</p><button class="btn" onclick="location.reload()">Дахин оролдох</button></div>'}}load();})();
</script></body></html>
