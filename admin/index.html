<!DOCTYPE html><html lang="mn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>POI Admin</title><meta http-equiv="refresh" content="0; url=calculator.html"><script>location.replace('calculator.html');</script>
<!-- POI V39.1 UNIFIED BACKGROUND: root/app/admin pages use the same aurora + network layer; no extra view background mismatch. -->
<style id="poi-v39-1-unified-background">
:root{--poi-bg-url:url('../aurora.jpg');}
html,body{
  background-color:#020608!important;
  background-image:
    radial-gradient(circle at 18% 8%,rgba(0,200,151,.11),transparent 30%),
    radial-gradient(circle at 78% 14%,rgba(79,195,247,.09),transparent 32%),
    linear-gradient(180deg,rgba(2,6,8,.30),rgba(2,6,8,.76)),
    var(--poi-bg-url)!important;
  background-size:auto,auto,auto,cover!important;
  background-position:center center!important;
  background-repeat:no-repeat!important;
  background-attachment:fixed!important;
}
body::before,body:before,body::after,body:after{
  content:none!important;
  display:none!important;
  background:transparent!important;
  background-image:none!important;
  opacity:0!important;
}
#wbg,#calcWbg{
  display:block!important;
  position:fixed!important;
  inset:0!important;
  width:100vw!important;
  height:100vh!important;
  pointer-events:none!important;
  z-index:0!important;
  opacity:.96!important;
  filter:none!important;
}
#view-calc,#view-performance,#view-home,#view-stage{
  background:transparent!important;
  background-image:none!important;
  filter:none!important;
}
#view-calc::before,#view-calc::after,#view-performance::before,#view-performance::after{
  content:none!important;
  display:none!important;
  background:transparent!important;
  background-image:none!important;
}
#calcframe,#performanceframe{
  background:transparent!important;
  color-scheme:dark;
}
.stars{display:none!important;}
.appbar,.deck-nav,.home-inner,.stage,.slide,.main,.wrap,.header,.admin-gate,.admin-box{
  position:relative;
}
@media (max-width:900px),(pointer:coarse){
  html,body{
    background-attachment:scroll!important;
    overflow-x:hidden!important;
    overflow-y:auto!important;
    -webkit-overflow-scrolling:touch!important;
    touch-action:pan-y!important;
    overscroll-behavior-y:auto!important;
  }
  #wbg,#calcWbg{opacity:.92!important;filter:none!important;}
}
</style>

</head><body><a href="calculator.html">Admin calculator</a></body></html>
